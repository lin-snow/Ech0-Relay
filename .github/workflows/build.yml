# Cross-compile the relay for linux/amd64 and publish it as a GitHub Release
# asset. sync.yml downloads the latest release binary, so the release MUST be
# non-draft (draft releases are invisible to `gh release download`).
name: build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build (linux/amd64, static)
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" \
            -o ech0-relay-linux-amd64 ./cmd/relay
          ./ech0-relay-linux-amd64 -version

      # Only publish a Release on a tag push. A stable, non-draft asset name lets
      # sync.yml resolve it as "latest".
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          prerelease: false
          files: ech0-relay-linux-amd64
