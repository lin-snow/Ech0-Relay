# Scheduled sync: download the latest release binary, relay new Telegram posts
# into Ech0, then commit the updated cursor state back to the repo.
name: sync

on:
  schedule:
    # Every 30 minutes. GitHub cron is best-effort and often delayed under load;
    # do not schedule below ~15 min. Scheduled workflows auto-disable after ~60
    # days of repository inactivity.
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

# Never run two syncs at once (avoids state write races); queue instead.
concurrency:
  group: relay-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download latest relay binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo "$GITHUB_REPOSITORY" \
            --pattern 'ech0-relay-linux-amd64' -O ./relay
          chmod +x ./relay

      - name: Run relay
        id: run
        continue-on-error: true
        # Map each instance's access token from a repository secret. GitHub
        # cannot index secrets by a dynamic name, so add one line here for every
        # instance you configure (matching its `token_env` in config.yaml).
        env:
          ECH0_RELAY_TOKEN: ${{ secrets.ECH0_RELAY_TOKEN }}
        run: ./relay -config config.yaml -state state/state.json

      - name: Commit cursor state
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add state/state.json
          # No-op when there is nothing new to commit.
          if git diff --staged --quiet; then
            echo "no state changes"
          else
            git commit -m 'chore(state): update cursors [skip ci]'
            git push
          fi

      # Surface a failed relay run AFTER state has been committed, so delivered
      # progress is persisted even on a partial failure.
      - name: Propagate relay failure
        if: steps.run.outcome == 'failure'
        run: |
          echo "::error::relay run failed — see the 'Run relay' step logs"
          exit 1
